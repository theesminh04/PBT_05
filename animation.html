<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animations & Transitions</title>
    <link rel="stylesheet" href="animations.css">
</head>
<body>

    <div class="wrapper">
        <h2 class="fade-in-title">Sản phẩm nổi bật</h2>

        <div class="product-card">
            
            <div class="image-container">
                <img src="https://i1-e.pinimg.com/1200x/b6/25/24/b62524713282f4cf20bc99f52d6dc7df.jpg" alt="Sản phẩm demo">
            </div>
            
            <div class="card-info">
                <h3>iPhone 16 Pro Max</h3>
                <p class="price">34,990,000 đ</p>
                <button class="buy-btn">Mua ngay</button>
            </div>
        </div>

        <div class="loading-section">
            <p>Đang tải thêm dữ liệu...</p>
            <div class="spinner"></div>
        </div>
    </div>

</body>
</html>
